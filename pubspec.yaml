name: yachay_ai
description: "Yachay AI - Plataforma educativa inteligente para niños bolivianos"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  flutter_animate: ^4.5.2
  flutter_tts: ^4.2.0
  record: ^5.2.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - web/favicon.png
    - Prompt_Library/01_System_Prompt/
    - Prompt_Library/02_Matematica/
    - Prompt_Library/03_Aymara/
    - Prompt_Library/04_Ciencias_Naturales/
    - Prompt_Library/05_Cs_Sociales/
    - Prompt_Library/06_JSON/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/favicon.png"

dependency_overrides:
  record_platform_interface: 1.4.0
  record_linux: 1.3.1
